<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b6fd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ab8a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a8a78;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Book icon -->
  <g transform="translate(10, 15)" filter="url(#shadow)">
    <!-- Back cover -->
    <rect x="4" y="2" width="36" height="66" rx="3" ry="3" fill="#1e3fa8" opacity="0.6"/>
    <!-- Front cover -->
    <rect x="0" y="0" width="36" height="66" rx="3" ry="3" fill="url(#bookGrad)"/>
    <!-- Spine -->
    <rect x="0" y="0" width="6" height="66" rx="2" ry="2" fill="#1a2e7a"/>
    <!-- Pages (right edge) -->
    <rect x="34" y="3" width="3" height="60" rx="1" fill="#e8edf8" opacity="0.9"/>
    <!-- Text lines on cover -->
    <rect x="10" y="14" width="18" height="2.5" rx="1" fill="white" opacity="0.9"/>
    <rect x="10" y="20" width="14" height="2" rx="1" fill="white" opacity="0.6"/>
    <rect x="10" y="35" width="16" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="10" y="40" width="12" height="2" rx="1" fill="white" opacity="0.4"/>
    <rect x="10" y="45" width="14" height="2" rx="1" fill="white" opacity="0.4"/>
  </g>

  <!-- Arrow with neural dots -->
  <g transform="translate(58, 38)">
    <!-- Dots suggesting AI/LLM processing -->
    <circle cx="8"  cy="12" r="3.5" fill="#6c8fd4" opacity="0.7"/>
    <circle cx="22" cy="6"  r="3"   fill="#5a7fc8" opacity="0.6"/>
    <circle cx="22" cy="18" r="3"   fill="#5a7fc8" opacity="0.6"/>
    <circle cx="36" cy="12" r="3.5" fill="#4a6fc0" opacity="0.7"/>
    <!-- Connecting lines -->
    <line x1="11.5" y1="12" x2="19" y2="7"  stroke="#6c8fd4" stroke-width="1" opacity="0.5"/>
    <line x1="11.5" y1="12" x2="19" y2="17" stroke="#6c8fd4" stroke-width="1" opacity="0.5"/>
    <line x1="25"   y1="6"  x2="32.5" y2="11" stroke="#4a6fc0" stroke-width="1" opacity="0.5"/>
    <line x1="25"   y1="18" x2="32.5" y2="13" stroke="#4a6fc0" stroke-width="1" opacity="0.5"/>
    <!-- Arrow -->
    <line x1="44" y1="12" x2="62" y2="12" stroke="#888" stroke-width="2" stroke-linecap="round"/>
    <polygon points="62,8 70,12 62,16" fill="#888"/>
  </g>

  <!-- Markdown output icon -->
  <g transform="translate(138, 10)" filter="url(#shadow)">
    <rect x="0" y="0" width="60" height="80" rx="4" ry="4" fill="url(#mdGrad)"/>
    <!-- Folded corner -->
    <polygon points="44,0 60,16 44,16" fill="#155f52"/>
    <polygon points="44,0 60,16 44,0"  fill="#1a8a78" opacity="0.5"/>
    <!-- # heading -->
    <text x="6" y="34" font-family="monospace" font-size="17" font-weight="bold" fill="white" opacity="0.95"># Md</text>
    <!-- text lines -->
    <rect x="6" y="40" width="38" height="2.5" rx="1" fill="white" opacity="0.6"/>
    <rect x="6" y="46" width="30" height="2.5" rx="1" fill="white" opacity="0.5"/>
    <rect x="6" y="52" width="34" height="2.5" rx="1" fill="white" opacity="0.5"/>
    <rect x="6" y="58" width="22" height="2.5" rx="1" fill="white" opacity="0.4"/>
    <rect x="6" y="64" width="36" height="2.5" rx="1" fill="white" opacity="0.4"/>
  </g>

  <!-- Project name -->
  <text x="212" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#1e2d5a" letter-spacing="-0.5">Book<tspan fill="#2ab8a0">2MD</tspan></text>
  <text x="212" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#1e2d5a" letter-spacing="-0.5">Converter</text>
  <text x="213" y="84" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#888" letter-spacing="1.5">PDF · EPUB → MARKDOWN</text>
</svg>
